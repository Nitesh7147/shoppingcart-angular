

<mat-toolbar color="primary">
    
    
    <img class="pic" src="assets/images/cart.png" />
    <!-- <span><a mat-icon-button routerLink="/login">Login</a></span> -->
     <span class="example-spacer"></span>
     <a>{{data.userid}}</a> 

     <i class= "one fas fa-shopping-cart" aria-hidden="true"></i>
 </mat-toolbar>


<div class="main-content">
     <div class="section-content section-content-p30"> 
        <div class="container-fluid"> 
            <div class="row">
                <div *ngFor="let tempProduct of products" class="col-md-3">
                    <mat-card class="card">
                        <div class ="product-box">
                            <img class="hammer" src="{{tempProduct.imageUrl}}">
                            <h4 class>{{tempProduct.item_Description}}</h4>
                            <hr>
                            <p class="outer">QTY {{tempProduct.item_Quantity}} </p>
                            <a class="primary-btn">Add to Cart</a>
                             <br>
                             <a class style="color: red; ">SKU: {{tempProduct.sku}}</a><br>
                             <a>Vendor: {{tempProduct.vendor_Number}}</a><br>
                             <a><strong>Cost: </strong>{{tempProduct.item_Cost | currency: 'INR'}}</a><br>
                        </div>
                    </mat-card>
             </div> 
            </div>
         </div> 
     </div> 
</div>
